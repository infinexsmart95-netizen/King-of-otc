<!DOCTYPE html>
<html lang="ur">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adeel Trader | King of OTC</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-deep:#0a0d14;
    --bg-panel:#11151f;
    --gold:#d4af37;
    --gold-bright:#f3d878;
    --green:#1fae67;
    --red:#e0435a;
    --text-soft:#c7cdda;
    --line:rgba(212,175,55,0.25);
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}

  body{
    min-height:100vh;
    background:var(--bg-deep);
    color:var(--text-soft);
    font-family:'Rajdhani', sans-serif;
    display:flex;
    justify-content:center;
    overflow-x:hidden;
    position:relative;
  }

  .page{
    position:relative;
    z-index:1;
    width:100%;
    max-width:440px;
    padding:38px 20px 50px;
    display:flex;
    flex-direction:column;
    align-items:center;
    min-height:100vh;
  }

  /* Logos row */
  .logo-row{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:22px;
    margin-bottom:18px;
  }
  .logo-badge{
    width:64px; height:64px;
    border-radius:16px;
    display:flex; align-items:center; justify-content:center;
    background:var(--bg-panel);
    border:1px solid var(--line);
    box-shadow:0 0 24px rgba(212,175,55,0.15);
  }
  .logo-badge svg{width:36px; height:36px;}

  .crown-divider{
    color:var(--gold);
    font-size:20px;
    opacity:0.7;
  }

  /* Name */
  h1.brand{
    font-family:'Cinzel', serif;
    font-weight:900;
    font-size:clamp(28px, 8vw, 38px);
    letter-spacing:1px;
    margin:6px 0 2px;
    text-align:center;
    background:linear-gradient(180deg, var(--gold-bright), var(--gold) 60%, #a67f22);
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    text-shadow:0 0 30px rgba(212,175,55,0.25);
  }
  .brand-sub{
    font-size:13px;
    letter-spacing:4px;
    text-transform:uppercase;
    color:var(--gold);
    opacity:0.75;
    margin-bottom:30px;
  }

  /* Buttons */
  .btn-stack{
    width:100%;
    display:flex;
    flex-direction:column;
    gap:14px;
    margin-bottom:34px;
  }
  .action-btn{
    position:relative;
    width:100%;
    display:flex;
    align-items:center;
    gap:14px;
    padding:16px 18px;
    border-radius:14px;
    border:1px solid var(--line);
    background:linear-gradient(180deg, #151a26, #0d1017);
    color:#fff;
    font-family:'Rajdhani', sans-serif;
    font-weight:600;
    font-size:17px;
    letter-spacing:0.4px;
    cursor:pointer;
    overflow:hidden;
    isolation:isolate;
    transition:transform .15s ease, box-shadow .25s ease, border-color .25s ease;
    text-decoration:none;
  }
  .action-btn:active{transform:scale(0.96);}
  .action-btn:hover{
    border-color:var(--gold);
    box-shadow:0 0 18px rgba(212,175,55,0.2);
  }

  /* Color-pop burst on touch/click */
  .burst{
    position:absolute;
    border-radius:50%;
    pointer-events:none;
    transform:translate(-50%,-50%) scale(0);
    animation:burstPop 0.6s ease-out forwards;
  }
  @keyframes burstPop{
    0%{transform:translate(-50%,-50%) scale(0); opacity:0.9;}
    70%{opacity:0.5;}
    100%{transform:translate(-50%,-50%) scale(1); opacity:0;}
  }
  .action-btn .icon-wrap{
    width:38px; height:38px;
    border-radius:10px;
    flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
  }
  .action-btn .icon-wrap svg{width:22px; height:22px;}
  .action-btn .label{flex:1; text-align:left;}
  .action-btn .arrow{opacity:0.5; font-size:18px;}

  .btn-telegram .icon-wrap{background:rgba(41,182,246,0.15);}
  .btn-telegram .icon-wrap svg{fill:#29b6f6;}

  .btn-quotex-create .icon-wrap{background:rgba(31,174,103,0.15);}
  .btn-quotex-create .icon-wrap svg{fill:var(--green);}

  .btn-contact .icon-wrap{background:rgba(37,211,102,0.15);}
  .btn-contact .icon-wrap svg{fill:#25d366;}

  .btn-quotex-signup .icon-wrap{background:rgba(212,175,55,0.18);}
  .btn-quotex-signup .icon-wrap svg{fill:var(--gold);}
  .btn-quotex-signup{
    border-color:var(--gold);
    background:linear-gradient(180deg, #1a1710, #12100a);
  }

  /* Tagline / footer */
  .tagline{
    text-align:center;
    margin-top:auto;
    padding-top:10px;
  }
  .tagline .crown-icon{
    width:34px; height:34px;
    margin-bottom:10px;
    fill:var(--gold);
    filter:drop-shadow(0 0 10px rgba(212,175,55,0.4));
  }
  .tagline h2{
    font-family:'Cinzel', serif;
    font-size:16px;
    letter-spacing:2px;
    text-transform:uppercase;
    color:var(--gold-bright);
    margin:0 0 6px;
  }
  .tagline p{
    font-size:14px;
    color:var(--text-soft);
    opacity:0.7;
    margin:0 0 14px;
    line-height:1.5;
  }
  .badges{
    display:flex;
    justify-content:center;
    gap:20px;
    opacity:0.6;
  }
  .badges svg{width:20px; height:20px; fill:var(--gold);}

  /* Loading overlay (3s animation on button click) */
  .loader-overlay{
    position:fixed;
    inset:0;
    background:rgba(10,13,20,0.94);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:18px;
    z-index:999;
    opacity:0;
    pointer-events:none;
    transition:opacity .25s ease;
  }
  .loader-overlay.show{
    opacity:1;
    pointer-events:all;
  }
  .loader-ring{
    width:64px; height:64px;
    border-radius:50%;
    border:3px solid rgba(212,175,55,0.18);
    border-top-color:var(--gold);
    animation:spin 0.9s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}
  .loader-text{
    font-family:'Cinzel', serif;
    color:var(--gold-bright);
    letter-spacing:2px;
    font-size:14px;
    text-transform:uppercase;
  }
  .loader-bar{
    width:180px; height:4px;
    background:rgba(255,255,255,0.08);
    border-radius:4px;
    overflow:hidden;
  }
  .loader-bar-fill{
    height:100%;
    width:0%;
    background:linear-gradient(90deg, var(--gold), var(--green));
    border-radius:4px;
  }
  .loader-overlay.show .loader-bar-fill{
    animation:fillBar 3s linear forwards;
  }
  @keyframes fillBar{
    from{width:0%;}
    to{width:100%;}
  }

  @media (prefers-reduced-motion: reduce){
    .bar, .loader-ring, .loader-overlay.show .loader-bar-fill{animation:none !important;}
  }
</style>
</head>

<!-- Loader overlay -->
<div class="loader-overlay" id="loaderOverlay">

  <div class="loader-text">Connecting...</div>
  <div class="loader-bar"><div class="loader-bar-fill"></div></div>
</div>

<script>
  // Color-pop burst colors per button type
  const burstColors = {
    'btn-telegram':'#29b6f6',
    'btn-quotex-create':'#1fae67',
    'btn-contact':'#25d366',
    'btn-quotex-signup':'#d4af37'
  };

  function spawnBurst(btn, x, y){
    const color = Object.keys(burstColors).find(cls => btn.classList.contains(cls));
    const hex = burstColors[color] || '#d4af37';
    const burst = document.createElement('span');
    burst.className = 'burst';
    const size = Math.max(btn.offsetWidth, btn.offsetHeight) * 1.6;
    burst.style.width = size + 'px';
    burst.style.height = size + 'px';
    burst.style.left = x + 'px';
    burst.style.top = y + 'px';
    burst.style.background = `radial-gradient(circle, ${hex}55 0%, ${hex}22 45%, transparent 70%)`;
    btn.appendChild(burst);
    setTimeout(() => burst.remove(), 650);
  }

  // Button click -> color pop + 3s loading animation -> open link
  const overlay = document.getElementById('loaderOverlay');
  document.querySelectorAll('.action-btn').forEach(btn => {
    btn.addEventListener('click', function(e){
      e.preventDefault();
      const rect = this.getBoundingClientRect();
      const x = (e.clientX || rect.left + rect.width/2) - rect.left;
      const y = (e.clientY || rect.top + rect.height/2) - rect.top;
      spawnBurst(this, x, y);

      const url = this.getAttribute('data-url');
      overlay.classList.add('show');
      setTimeout(() => {
        overlay.classList.remove('show');
        window.open(url, '_blank');
      }, 3000);
    });
  });
</script>
